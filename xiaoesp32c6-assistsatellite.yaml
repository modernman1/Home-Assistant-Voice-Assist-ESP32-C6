rtttl:
  id: boot_chime
  speaker: va_speaker
  gain: 1.0

esphome:
  name: voice-satellite-mic
  friendly_name: Voice Satellite
  on_boot:
    priority: -100
    then:
      - delay: 2000ms
      - lambda: |-
          id(va_speaker).set_volume(3.0f);
      - rtttl.play:
          id: boot_chime
          rtttl: "boot:d=32,o=5,b=180:c,e,g"
      - wait_until:
          condition:
            not:
              rtttl.is_playing:
      - lambda: |-
          id(va_speaker).set_volume(id(vol));

esp32:
  board: seeed_xiao_esp32c6
  variant: esp32c6
  framework:
    type: esp-idf

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key
  on_client_connected:
    - delay: 100ms
    - micro_wake_word.start:
  on_client_disconnected:
    - voice_assistant.stop:

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret fallback_ap_password

captive_portal:

# ── Global volume state ──────────────────────────────────────────────────────
globals:
  - id: vol
    type: float
    restore_value: true
    initial_value: '1.0'

# ── I2S bus ──────────────────────────────────────────────────────────────────
i2s_audio:
  - id: i2s_bus
    i2s_bclk_pin: GPIO1
    i2s_lrclk_pin: GPIO0

# ── INMP441 microphone ───────────────────────────────────────────────────────
microphone:
  - platform: i2s_audio
    id: inmp441_mic
    i2s_audio_id: i2s_bus
    i2s_din_pin: GPIO2
    adc_type: external
    pdm: false
    channel: right
    bits_per_sample: 32bit
    sample_rate: 16000

# ── MAX98357A speaker ────────────────────────────────────────────────────────
speaker:
  - platform: i2s_audio
    id: va_speaker
    i2s_audio_id: i2s_bus
    dac_type: external
    i2s_dout_pin: GPIO20
    channel: mono
    sample_rate: 16000
    timeout: 4000ms

# ── Wake word indicator LED ──────────────────────────────────────────────────
output:
  - platform: gpio
    id: wake_led_output
    pin: GPIO18

light:
  - platform: binary
    id: wake_led
    output: wake_led_output
    name: "Wake Word LED"
  - platform: status_led
    id: status_light
    pin: GPIO15

# ── Volume slider ────────────────────────────────────────────────────────────
number:
  - platform: template
    name: "Speaker Volume"
    id: speaker_volume
    min_value: 0.1
    max_value: 2.0
    step: 0.1
    initial_value: 1.0
    optimistic: true
    restore_value: true
    on_value:
      - lambda: |-
          id(vol) = x;
          id(va_speaker).set_volume(x);

# ── microWakeWord ────────────────────────────────────────────────────────────
micro_wake_word:
  microphone: inmp441_mic
  models:
    - model: https://github.com/esphome/micro-wake-word-models/raw/main/models/v2/hey_mycroft.json
  on_wake_word_detected:
    - light.turn_on: wake_led
    - lambda: |-
        id(va_speaker).set_volume(2.0f);
    - rtttl.play:
        id: boot_chime
        rtttl: "wake:d=32,o=6,b=180:c,e"
    - wait_until:
        condition:
          not:
            rtttl.is_playing:
    - lambda: |-
        id(va_speaker).set_volume(id(vol));
    - voice_assistant.start:

# ── Voice Assistant ──────────────────────────────────────────────────────────
voice_assistant:
  id: va
  microphone: inmp441_mic
  speaker: va_speaker
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  on_listening:
    - logger.log: "Listening..."
  on_end:
    - delay: 4000ms
    - light.turn_off: wake_led
    - micro_wake_word.start:
  on_error:
    - delay: 500ms
    - light.turn_off: wake_led
    - micro_wake_word.start:
  on_idle:
    - light.turn_off: wake_led
    - micro_wake_word.start: